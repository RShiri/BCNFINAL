<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body{margin:0;background:#0d0d1a;color:#e0e0e0;font-family:system-ui}
.ctrl-1914145_home_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}
.ctrl-1914145_home_drib label{font-size:11px;color:#8888bb;letter-spacing:1px;text-transform:uppercase}
.ctrl-1914145_home_drib select{background:#0d0d1a;color:#e0e0e0;border:1px solid #4444aa;border-radius:6px;padding:5px 10px;font-size:12px}
#chart_1914145_home_drib{width:100%;height:520px}
</style></head><body>
<div class="ctrl-1914145_home_drib">
  <label>Player:</label>
  <select id="psel_1914145_home_drib" onchange="window.redraw_1914145_home_drib()">
    <option value="all">All Players</option>
    <option value="Berenguer">Berenguer</option><option value="Boiro">Boiro</option><option value="Gómez">Gómez</option><option value="Navarro">Navarro</option><option value="Sancet">Sancet</option><option value="Sánchez">Sánchez</option><option value="Vesga">Vesga</option><option value="Vivian">Vivian</option><option value="Williams">Williams</option>
  </select>
  <label style="margin-left:12px">Outcome:</label>
  <select id="osel_1914145_home_drib" onchange="window.redraw_1914145_home_drib()">
    <option value="all">All</option>
    <option value="Successful">Successful</option>
    <option value="Unsuccessful">Unsuccessful</option>
  </select>
  <span id="summary_1914145_home_drib" style="margin-left:auto;font-size:12px;color:#9999cc"></span>
</div>
<div id="chart_1914145_home_drib"></div>
<script>
(function(){
  var data = [{"x": 75.6, "y": 67.2, "player": "G\u00f3mez", "outcome": "Unsuccessful", "minute": 3}, {"x": 95.75999999999999, "y": 75.84, "player": "G\u00f3mez", "outcome": "Successful", "minute": 7}, {"x": 107.64, "y": 74.8, "player": "G\u00f3mez", "outcome": "Unsuccessful", "minute": 7}, {"x": 79.8, "y": 9.68, "player": "Berenguer", "outcome": "Unsuccessful", "minute": 30}, {"x": 88.68, "y": 38.800000000000004, "player": "Williams", "outcome": "Unsuccessful", "minute": 34}, {"x": 105.36, "y": 48.0, "player": "S\u00e1nchez", "outcome": "Unsuccessful", "minute": 34}, {"x": 43.08, "y": 53.84, "player": "S\u00e1nchez", "outcome": "Unsuccessful", "minute": 47}, {"x": 51.959999999999994, "y": 19.12, "player": "Sancet", "outcome": "Unsuccessful", "minute": 52}, {"x": 106.91999999999999, "y": 64.08, "player": "Vivian", "outcome": "Successful", "minute": 57}, {"x": 68.88, "y": 73.28, "player": "Navarro", "outcome": "Successful", "minute": 59}, {"x": 87.6, "y": 70.16000000000001, "player": "Navarro", "outcome": "Unsuccessful", "minute": 60}, {"x": 89.52, "y": 72.8, "player": "Boiro", "outcome": "Unsuccessful", "minute": 60}, {"x": 46.8, "y": 23.28, "player": "Vivian", "outcome": "Successful", "minute": 70}, {"x": 89.04, "y": 31.84, "player": "Berenguer", "outcome": "Successful", "minute": 72}, {"x": 96.24, "y": 7.2, "player": "Berenguer", "outcome": "Unsuccessful", "minute": 80}, {"x": 84.96, "y": 67.12, "player": "Vesga", "outcome": "Successful", "minute": 88}, {"x": 87.96, "y": 60.800000000000004, "player": "Vesga", "outcome": "Successful", "minute": 88}, {"x": 78.96, "y": 40.88, "player": "Vivian", "outcome": "Successful", "minute": 92}];
  var shapes = [{"type": "rect", "x0": 0, "y0": 0, "x1": 120, "y1": 80, "line": {"color": "white", "width": 2}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "line", "x0": 60, "y0": 0, "x1": 60, "y1": 80, "line": {"color": "white", "width": 1.5}}, {"type": "circle", "x0": 51, "y0": 31, "x1": 69, "y1": 49, "line": {"color": "white", "width": 1.5}}, {"type": "rect", "x0": 0, "y0": 18, "x1": 18, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 0, "y0": 30, "x1": 6, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 102, "y0": 18, "x1": 120, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 114, "y0": 30, "x1": 120, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}];

  window.redraw_1914145_home_drib = function() {
    var p = document.getElementById("psel_1914145_home_drib").value;
    var o = document.getElementById("osel_1914145_home_drib").value;
    var filtered = data.filter(function(d){
      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);
    });
    var succ = filtered.filter(function(d){return d.outcome==="Successful";});
    var fail = filtered.filter(function(d){return d.outcome==="Unsuccessful";});
    document.getElementById("summary_1914145_home_drib").textContent =
      succ.length+" successful · "+fail.length+" unsuccessful";

    var traces = [
      {
        x: succ.map(function(d){return d.x;}), y: succ.map(function(d){return d.y;}),
        mode:"markers", name:"Successful",
        marker:{size:12, color:"#2ca02c", symbol:"circle", line:{width:1.5, color:"white"}},
        hovertext: succ.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Successful Take-On";}),
        hoverinfo:"text"
      },
      {
        x: fail.map(function(d){return d.x;}), y: fail.map(function(d){return d.y;}),
        mode:"markers", name:"Unsuccessful",
        marker:{size:12, color:"#d62728", symbol:"x", line:{width:2, color:"#ff6666"}},
        hovertext: fail.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Unsuccessful Take-On";}),
        hoverinfo:"text"
      }
    ];

    var layout = {
      paper_bgcolor:"#0d0d1a", plot_bgcolor:"#2d572c",
      font:{color:"white"},
      shapes: shapes,
      xaxis:{range:[-2,122], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      yaxis:{range:[82,-2], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      showlegend:true,
      legend:{x:0.5, y:-0.04, xanchor:"center", orientation:"h", font:{color:"white",size:12}, bgcolor:"rgba(0,0,0,0)"},
      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1914145_home_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1914145_home_drib();
})();
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body{margin:0;background:#0d0d1a;color:#e0e0e0;font-family:system-ui}
.ctrl-1914200_away_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}
.ctrl-1914200_away_drib label{font-size:11px;color:#8888bb;letter-spacing:1px;text-transform:uppercase}
.ctrl-1914200_away_drib select{background:#0d0d1a;color:#e0e0e0;border:1px solid #4444aa;border-radius:6px;padding:5px 10px;font-size:12px}
#chart_1914200_away_drib{width:100%;height:520px}
</style></head><body>
<div class="ctrl-1914200_away_drib">
  <label>Player:</label>
  <select id="psel_1914200_away_drib" onchange="window.redraw_1914200_away_drib()">
    <option value="all">All Players</option>
    <option value="Calero">Calero</option><option value="Dolan">Dolan</option><option value="Hilali">Hilali</option><option value="Ngonge">Ngonge</option><option value="Romero">Romero</option><option value="Sánchez">Sánchez</option><option value="Zárate">Zárate</option>
  </select>
  <label style="margin-left:12px">Outcome:</label>
  <select id="osel_1914200_away_drib" onchange="window.redraw_1914200_away_drib()">
    <option value="all">All</option>
    <option value="Successful">Successful</option>
    <option value="Unsuccessful">Unsuccessful</option>
  </select>
  <span id="summary_1914200_away_drib" style="margin-left:auto;font-size:12px;color:#9999cc"></span>
</div>
<div id="chart_1914200_away_drib"></div>
<script>
(function(){
  var data = [{"x": 32.279999999999994, "y": 74.96, "player": "Ngonge", "outcome": "Unsuccessful", "minute": 4}, {"x": 113.52, "y": 78.24, "player": "Ngonge", "outcome": "Unsuccessful", "minute": 21}, {"x": 30.12, "y": 10.399999999999991, "player": "Dolan", "outcome": "Unsuccessful", "minute": 35}, {"x": 74.04, "y": 5.279999999999987, "player": "Romero", "outcome": "Unsuccessful", "minute": 42}, {"x": 50.4, "y": 63.68, "player": "Z\u00e1rate", "outcome": "Unsuccessful", "minute": 47}, {"x": 42.24, "y": 66.4, "player": "Ngonge", "outcome": "Unsuccessful", "minute": 48}, {"x": 86.64, "y": 14.239999999999995, "player": "Romero", "outcome": "Successful", "minute": 49}, {"x": 82.8, "y": 33.919999999999995, "player": "Calero", "outcome": "Unsuccessful", "minute": 50}, {"x": 101.52, "y": 68.16, "player": "Ngonge", "outcome": "Unsuccessful", "minute": 51}, {"x": 32.16, "y": 8.0, "player": "Romero", "outcome": "Unsuccessful", "minute": 52}, {"x": 103.91999999999999, "y": 69.36, "player": "Ngonge", "outcome": "Unsuccessful", "minute": 60}, {"x": 33.839999999999996, "y": 21.279999999999994, "player": "Romero", "outcome": "Successful", "minute": 65}, {"x": 70.55999999999999, "y": 74.88, "player": "S\u00e1nchez", "outcome": "Successful", "minute": 78}, {"x": 107.52, "y": 71.84, "player": "S\u00e1nchez", "outcome": "Unsuccessful", "minute": 80}, {"x": 69.96, "y": 52.0, "player": "Hilali", "outcome": "Successful", "minute": 92}];
  var shapes = [{"type": "rect", "x0": 0, "y0": 0, "x1": 120, "y1": 80, "line": {"color": "white", "width": 2}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "line", "x0": 60, "y0": 0, "x1": 60, "y1": 80, "line": {"color": "white", "width": 1.5}}, {"type": "circle", "x0": 51, "y0": 31, "x1": 69, "y1": 49, "line": {"color": "white", "width": 1.5}}, {"type": "rect", "x0": 0, "y0": 18, "x1": 18, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 0, "y0": 30, "x1": 6, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 102, "y0": 18, "x1": 120, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 114, "y0": 30, "x1": 120, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}];

  window.redraw_1914200_away_drib = function() {
    var p = document.getElementById("psel_1914200_away_drib").value;
    var o = document.getElementById("osel_1914200_away_drib").value;
    var filtered = data.filter(function(d){
      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);
    });
    var succ = filtered.filter(function(d){return d.outcome==="Successful";});
    var fail = filtered.filter(function(d){return d.outcome==="Unsuccessful";});
    document.getElementById("summary_1914200_away_drib").textContent =
      succ.length+" successful · "+fail.length+" unsuccessful";

    var traces = [
      {
        x: succ.map(function(d){return d.x;}), y: succ.map(function(d){return d.y;}),
        mode:"markers", name:"Successful",
        marker:{size:12, color:"#2ca02c", symbol:"circle", line:{width:1.5, color:"white"}},
        hovertext: succ.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Successful Take-On";}),
        hoverinfo:"text"
      },
      {
        x: fail.map(function(d){return d.x;}), y: fail.map(function(d){return d.y;}),
        mode:"markers", name:"Unsuccessful",
        marker:{size:12, color:"#d62728", symbol:"x", line:{width:2, color:"#ff6666"}},
        hovertext: fail.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Unsuccessful Take-On";}),
        hoverinfo:"text"
      }
    ];

    var layout = {
      paper_bgcolor:"#0d0d1a", plot_bgcolor:"#2d572c",
      font:{color:"white"},
      shapes: shapes,
      xaxis:{range:[-2,122], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      yaxis:{range:[-2,82], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      showlegend:true,
      legend:{x:0.5, y:-0.04, xanchor:"center", orientation:"h", font:{color:"white",size:12}, bgcolor:"rgba(0,0,0,0)"},
      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1914200_away_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1914200_away_drib();
})();
</script></body></html>

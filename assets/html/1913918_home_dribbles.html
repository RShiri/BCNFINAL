<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body{margin:0;background:#0d0d1a;color:#e0e0e0;font-family:system-ui}
.ctrl-1913918_home_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}
.ctrl-1913918_home_drib label{font-size:11px;color:#8888bb;letter-spacing:1px;text-transform:uppercase}
.ctrl-1913918_home_drib select{background:#0d0d1a;color:#e0e0e0;border:1px solid #4444aa;border-radius:6px;padding:5px 10px;font-size:12px}
#chart_1913918_home_drib{width:100%;height:520px}
</style></head><body>
<div class="ctrl-1913918_home_drib">
  <label>Player:</label>
  <select id="psel_1913918_home_drib" onchange="window.redraw_1913918_home_drib()">
    <option value="all">All Players</option>
    <option value="Asano">Asano</option><option value="Darder">Darder</option><option value="Mojica">Mojica</option><option value="Morey">Morey</option><option value="Salas">Salas</option>
  </select>
  <label style="margin-left:12px">Outcome:</label>
  <select id="osel_1913918_home_drib" onchange="window.redraw_1913918_home_drib()">
    <option value="all">All</option>
    <option value="Successful">Successful</option>
    <option value="Unsuccessful">Unsuccessful</option>
  </select>
  <span id="summary_1913918_home_drib" style="margin-left:auto;font-size:12px;color:#9999cc"></span>
</div>
<div id="chart_1913918_home_drib"></div>
<script>
(function(){
  var data = [{"x": 37.56, "y": 4.4799999999999995, "player": "Morey", "outcome": "Successful", "minute": 0}, {"x": 68.88, "y": 4.32, "player": "Asano", "outcome": "Unsuccessful", "minute": 6}, {"x": 66.24, "y": 73.76, "player": "Mojica", "outcome": "Unsuccessful", "minute": 8}, {"x": 34.8, "y": 64.88, "player": "Darder", "outcome": "Unsuccessful", "minute": 10}, {"x": 86.39999999999999, "y": 20.0, "player": "Morey", "outcome": "Unsuccessful", "minute": 20}, {"x": 74.16, "y": 8.0, "player": "Darder", "outcome": "Unsuccessful", "minute": 48}, {"x": 48.24, "y": 13.280000000000001, "player": "Darder", "outcome": "Unsuccessful", "minute": 63}, {"x": 36.72, "y": 74.88, "player": "Mojica", "outcome": "Unsuccessful", "minute": 63}, {"x": 34.92, "y": 55.2, "player": "Salas", "outcome": "Successful", "minute": 89}];
  var shapes = [{"type": "rect", "x0": 0, "y0": 0, "x1": 120, "y1": 80, "line": {"color": "white", "width": 2}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "line", "x0": 60, "y0": 0, "x1": 60, "y1": 80, "line": {"color": "white", "width": 1.5}}, {"type": "circle", "x0": 51, "y0": 31, "x1": 69, "y1": 49, "line": {"color": "white", "width": 1.5}}, {"type": "rect", "x0": 0, "y0": 18, "x1": 18, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 0, "y0": 30, "x1": 6, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 102, "y0": 18, "x1": 120, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 114, "y0": 30, "x1": 120, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}];

  window.redraw_1913918_home_drib = function() {
    var p = document.getElementById("psel_1913918_home_drib").value;
    var o = document.getElementById("osel_1913918_home_drib").value;
    var filtered = data.filter(function(d){
      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);
    });
    var succ = filtered.filter(function(d){return d.outcome==="Successful";});
    var fail = filtered.filter(function(d){return d.outcome==="Unsuccessful";});
    document.getElementById("summary_1913918_home_drib").textContent =
      succ.length+" successful · "+fail.length+" unsuccessful";

    var traces = [
      {
        x: succ.map(function(d){return d.x;}), y: succ.map(function(d){return d.y;}),
        mode:"markers", name:"Successful",
        marker:{size:12, color:"#2ca02c", symbol:"circle", line:{width:1.5, color:"white"}},
        hovertext: succ.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Successful Take-On";}),
        hoverinfo:"text"
      },
      {
        x: fail.map(function(d){return d.x;}), y: fail.map(function(d){return d.y;}),
        mode:"markers", name:"Unsuccessful",
        marker:{size:12, color:"#d62728", symbol:"x", line:{width:2, color:"#ff6666"}},
        hovertext: fail.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Unsuccessful Take-On";}),
        hoverinfo:"text"
      }
    ];

    var layout = {
      paper_bgcolor:"#0d0d1a", plot_bgcolor:"#2d572c",
      font:{color:"white"},
      shapes: shapes,
      xaxis:{range:[-2,122], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      yaxis:{range:[82,-2], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      showlegend:true,
      legend:{x:0.5, y:-0.04, xanchor:"center", orientation:"h", font:{color:"white",size:12}, bgcolor:"rgba(0,0,0,0)"},
      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1913918_home_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1913918_home_drib();
})();
</script></body></html>

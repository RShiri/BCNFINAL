<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body{margin:0;background:#0d0d1a;color:#e0e0e0;font-family:system-ui}
.ctrl-1946393_home_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}
.ctrl-1946393_home_drib label{font-size:11px;color:#8888bb;letter-spacing:1px;text-transform:uppercase}
.ctrl-1946393_home_drib select{background:#0d0d1a;color:#e0e0e0;border:1px solid #4444aa;border-radius:6px;padding:5px 10px;font-size:12px}
#chart_1946393_home_drib{width:100%;height:520px}
</style></head><body>
<div class="ctrl-1946393_home_drib">
  <label>Player:</label>
  <select id="psel_1946393_home_drib" onchange="window.redraw_1946393_home_drib()">
    <option value="all">All Players</option>
    <option value="Forbs">Forbs</option><option value="Sabbe">Sabbe</option><option value="Seys">Seys</option><option value="Tresoldi">Tresoldi</option><option value="Vanaken">Vanaken</option><option value="Vermant">Vermant</option>
  </select>
  <label style="margin-left:12px">Outcome:</label>
  <select id="osel_1946393_home_drib" onchange="window.redraw_1946393_home_drib()">
    <option value="all">All</option>
    <option value="Successful">Successful</option>
    <option value="Unsuccessful">Unsuccessful</option>
  </select>
  <span id="summary_1946393_home_drib" style="margin-left:auto;font-size:12px;color:#9999cc"></span>
</div>
<div id="chart_1946393_home_drib"></div>
<script>
(function(){
  var data = [{"x": 34.92, "y": 45.76, "player": "Vanaken", "outcome": "Unsuccessful", "minute": 10}, {"x": 106.32, "y": 76.0, "player": "Sabbe", "outcome": "Unsuccessful", "minute": 22}, {"x": 51.6, "y": 40.16, "player": "Vanaken", "outcome": "Successful", "minute": 33}, {"x": 27.84, "y": 50.08, "player": "Forbs", "outcome": "Unsuccessful", "minute": 37}, {"x": 78.48, "y": 61.36, "player": "Sabbe", "outcome": "Successful", "minute": 43}, {"x": 68.88, "y": 5.1200000000000045, "player": "Seys", "outcome": "Successful", "minute": 46}, {"x": 27.479999999999997, "y": 70.16, "player": "Sabbe", "outcome": "Successful", "minute": 50}, {"x": 66.24, "y": 2.5600000000000023, "player": "Tresoldi", "outcome": "Unsuccessful", "minute": 57}, {"x": 66.36, "y": 63.04, "player": "Forbs", "outcome": "Unsuccessful", "minute": 64}, {"x": 39.35999999999999, "y": 39.68, "player": "Vanaken", "outcome": "Successful", "minute": 67}, {"x": 49.440000000000005, "y": 66.72, "player": "Sabbe", "outcome": "Successful", "minute": 78}, {"x": 56.16, "y": 57.12, "player": "Vanaken", "outcome": "Successful", "minute": 94}, {"x": 73.32, "y": 61.28, "player": "Vermant", "outcome": "Unsuccessful", "minute": 95}];
  var shapes = [{"type": "rect", "x0": 0, "y0": 0, "x1": 120, "y1": 80, "line": {"color": "white", "width": 2}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "line", "x0": 60, "y0": 0, "x1": 60, "y1": 80, "line": {"color": "white", "width": 1.5}}, {"type": "circle", "x0": 51, "y0": 31, "x1": 69, "y1": 49, "line": {"color": "white", "width": 1.5}}, {"type": "rect", "x0": 0, "y0": 18, "x1": 18, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 0, "y0": 30, "x1": 6, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 102, "y0": 18, "x1": 120, "y1": 62, "line": {"color": "white", "width": 1.5}, "fillcolor": "rgba(0,0,0,0)"}, {"type": "rect", "x0": 114, "y0": 30, "x1": 120, "y1": 50, "line": {"color": "white", "width": 1}, "fillcolor": "rgba(0,0,0,0)"}];

  window.redraw_1946393_home_drib = function() {
    var p = document.getElementById("psel_1946393_home_drib").value;
    var o = document.getElementById("osel_1946393_home_drib").value;
    var filtered = data.filter(function(d){
      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);
    });
    var succ = filtered.filter(function(d){return d.outcome==="Successful";});
    var fail = filtered.filter(function(d){return d.outcome==="Unsuccessful";});
    document.getElementById("summary_1946393_home_drib").textContent =
      succ.length+" successful · "+fail.length+" unsuccessful";

    var traces = [
      {
        x: succ.map(function(d){return d.x;}), y: succ.map(function(d){return d.y;}),
        mode:"markers", name:"Successful",
        marker:{size:12, color:"#2ca02c", symbol:"circle", line:{width:1.5, color:"white"}},
        hovertext: succ.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Successful Take-On";}),
        hoverinfo:"text"
      },
      {
        x: fail.map(function(d){return d.x;}), y: fail.map(function(d){return d.y;}),
        mode:"markers", name:"Unsuccessful",
        marker:{size:12, color:"#d62728", symbol:"x", line:{width:2, color:"#ff6666"}},
        hovertext: fail.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Unsuccessful Take-On";}),
        hoverinfo:"text"
      }
    ];

    var layout = {
      paper_bgcolor:"#0d0d1a", plot_bgcolor:"#2d572c",
      font:{color:"white"},
      shapes: shapes,
      xaxis:{range:[-2,122], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      yaxis:{range:[-2,82], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      showlegend:true,
      legend:{x:0.5, y:-0.04, xanchor:"center", orientation:"h", font:{color:"white",size:12}, bgcolor:"rgba(0,0,0,0)"},
      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1946393_home_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1946393_home_drib();
})();
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>

.ctrl-1946405_home_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}
.ctrl-1946405_home_drib label{font-size:11px;color:#8888bb;letter-spacing:1px;text-transform:uppercase}

</style></head><body>
<div class="ctrl-1946405_home_drib">

  </select>

    <option value="Successful">Successful</option>
    <option value="Unsuccessful">Unsuccessful</option>

<div id="chart_1946405_home_drib"></div>
<script>

    var o = document.getElementById("osel_1946405_home_drib").value;

      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);

    var succ = filtered.filter(function(d){return d.outcome==="Successful";});

    var traces = [

        hoverinfo:"text"

      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1946405_home_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1946405_home_drib();
})();
</script></body></html>

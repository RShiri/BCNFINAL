name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "assets/html/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Allow the workflow to enable Pages, publish the artifact and mint the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the pre-built dashboard (index.html + per-match pages) as the site root.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: assets/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

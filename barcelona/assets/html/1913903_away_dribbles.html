<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>

.ctrl-1913903_away_drib{display:flex;gap:12px;align-items:center;padding:10px 16px;background:#111128;flex-wrap:wrap}

.ctrl-1913903_away_drib select{background:#0d0d1a;color:#e0e0e0;border:1px solid #4444aa;border-radius:6px;padding:5px 10px;font-size:12px}
#chart_1913903_away_drib{width:100%;height:520px}
</style></head><body>
<div class="ctrl-1913903_away_drib">
  <label>Player:</label>
  <select id="psel_1913903_away_drib" onchange="window.redraw_1913903_away_drib()">

    <option value="Arambarri">Arambarri</option><option value="Dakonam">Dakonam</option><option value="Davinchi">Davinchi</option><option value="Femenía">Femenía</option><option value="Kamara">Kamara</option><option value="Liso">Liso</option><option value="Milla">Milla</option><option value="Rico">Rico</option>

</div>
<div id="chart_1913903_away_drib"></div>
<script>
(function(){
  var data = [{"x": 79.32, "y": 39.919999999999995, "player": "Liso", "outcome": "Unsuccessful", "minute": 9}, {"x": 81.36, "y": 75.36, "player": "Liso", "outcome": "Unsuccessful", "minute": 15}, {"x": 96.71999999999998, "y": 73.12, "player": "Liso", "outcome": "Successful", "minute": 18}, {"x": 40.08, "y": 73.12, "player": "Arambarri", "outcome": "Unsuccessful", "minute": 24}, {"x": 68.16, "y": 38.96, "player": "Liso", "outcome": "Unsuccessful", "minute": 25}, {"x": 55.559999999999995, "y": 16.07999999999999, "player": "Dakonam", "outcome": "Successful", "minute": 29}, {"x": 109.32, "y": 70.88, "player": "Kamara", "outcome": "Unsuccessful", "minute": 65}, {"x": 33.12, "y": 17.039999999999992, "player": "Rico", "outcome": "Successful", "minute": 73}, {"x": 32.4, "y": 21.92, "player": "Davinchi", "outcome": "Successful", "minute": 83}, {"x": 99.84, "y": 71.6, "player": "Femen\u00eda", "outcome": "Unsuccessful", "minute": 87}, {"x": 86.28, "y": 67.84, "player": "Milla", "outcome": "Successful", "minute": 87}, {"x": 85.68, "y": 7.839999999999989, "player": "Davinchi", "outcome": "Successful", "minute": 90}];

    var p = document.getElementById("psel_1913903_away_drib").value;
    var o = document.getElementById("osel_1913903_away_drib").value;
    var filtered = data.filter(function(d){
      return (p==="all" || d.player===p) && (o==="all" || d.outcome===o);
    });
    var succ = filtered.filter(function(d){return d.outcome==="Successful";});
    var fail = filtered.filter(function(d){return d.outcome==="Unsuccessful";});

    var traces = [

        x: succ.map(function(d){return d.x;}), y: succ.map(function(d){return d.y;}),
        mode:"markers", name:"Successful",
        marker:{size:12, color:"#2ca02c", symbol:"circle", line:{width:1.5, color:"white"}},
        hovertext: succ.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Successful Take-On";}),
        hoverinfo:"text"
      },
      {
        x: fail.map(function(d){return d.x;}), y: fail.map(function(d){return d.y;}),
        mode:"markers", name:"Unsuccessful",
        marker:{size:12, color:"#d62728", symbol:"x", line:{width:2, color:"#ff6666"}},
        hovertext: fail.map(function(d){return "<b>"+d.player+"</b> ("+d.minute+"')<br>Unsuccessful Take-On";}),
        hoverinfo:"text"

    var layout = {

      shapes: shapes,
      xaxis:{range:[-2,122], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},

      showlegend:true,

      margin:{l:10,r:10,t:14,b:10},
    };

    Plotly.newPlot("chart_1913903_away_drib", traces, layout, {responsive:true, displayModeBar:false});
  };

  window.redraw_1913903_away_drib();
})();
</script></body></html>
